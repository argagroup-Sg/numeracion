      try {

        const config = {};
        
        html5QrcodeScanner.start(
          { facingMode: "environment" },
          config,
          codigoDetectadoEnVivo
        ).then(() => {
          r.className = "green";
          r.innerHTML = "Cámara encendida. Enfoque un código QR.";

    function codigoDetectadoEnVivo(decodedText) {
      if (procesandoScan) return;
      procesandoScan = true;

        script.onerror = function() {
          mostrarRespuestaServidor({ ok: false, color: "red", mensaje: "Error crítico de conexión con Google." });
        };
        document.body.appendChild(script);
      }).catch(err => {
        procesandoScan = false;
      });
    }

  <script>
    // CAMBIA ESTO POR TU URL DE GOOGLE WEB APP ACTUALIZADO
    const WEB_APP_URL = "https://google.com";
    
    let html5QrcodeScanner = null;
    let procesandoScan = false;
    let modoActual = ""; // Puede ser 'buscarAsignar' o 'devolver'
    let codigoQRLimpioGuardado = ""; // Almacena temporalmente el QR para la confirmación

    window.onerror = function(msg, url, linenumber) {
      const r = document.getElementById("resultado");
      r.className = "red";
      r.innerHTML = "Error de ejecución: " + msg + " (Línea: " + linenumber + ")";
      return false;
    };

    function configurarModoEscaneo(modo) {
      modoActual = modo;
      document.getElementById("contenedor-botones-menu").style.display = "none";
      document.getElementById("btnCancelarCamara").style.display = "block";
      document.getElementById("reader").style.display = "block";
      
      const r = document.getElementById("resultado");
      r.className = "";
      r.innerHTML = "Iniciando cámara...";
      
      iniciarCamara();
    }

    function iniciarCamara() {
      try {
        html5QrcodeScanner = new Html5Qrcode("reader");
        const config = {};
        
        html5QrcodeScanner.start(
          { facingMode: "environment" },
          config,
          codigoQrDetectado
        ).catch(err => {
          html5QrcodeScanner.start(undefined, config, codigoQrDetectado)
          .catch(errFinal => {
            const r = document.getElementById("resultado");
            r.className = "red";
            r.innerHTML = "Error de hardware cámara: " + errFinal;
            cancelarEscaneo();
          });
        });
      } catch (e) {
        document.getElementById("resultado").innerHTML = "Error: " + e.message;
      }
    }

    function codigoQrDetectado(decodedText) {
      if (procesandoScan) return;
      procesandoScan = true;
      
      const r = document.getElementById("resultado");
      r.className = "";
      r.innerHTML = "Consultando base de datos...";
      
      html5QrcodeScanner.stop().then(() => {
        ejecutarPeticionJsonp({ accion: modoActual, codigoQR: decodedText });
      }).catch(() => { procesandoScan = false; });
    }

    function ejecutarPeticionJsonp(parametros) {
      const viejoScript = document.getElementById("jsonp-request");
      if (viejoScript) viejoScript.remove();
      
      let queryParams = [];
      for (let llave in parametros) {
        queryParams.push(llave + "=" + encodeURIComponent(parametros[llave]));
      }
      queryParams.push("callback=procesarRespuestaServidorJSONP");
      
      const script = document.createElement("script");
      script.id = "jsonp-request";
      script.src = WEB_APP_URL + "?" + queryParams.join("&");
      
      script.onerror = function() {
        procesarRespuestaServidorJSONP({ ok: false, color: "red", mensaje: "Error crítico de comunicación con Google." });
      };
      document.body.appendChild(script);
    }

    // RETORNO GLOBAL DE JSONP

      const script = document.getElementById("jsonp-request");

        r.innerHTML = "";
        r.className = "";
        
        if (data.tipoVista === "formularioAsignar") {
          codigoQRLimpioGuardado = data.codigoReal;
          document.getElementById("asignar-nombre").innerText = data.nombre || "-";
          document.getElementById("asignar-cedula").innerText = data.cedula || "-";
          document.getElementById("inputNumeroAsignado").value = "";
          
          const img = document.getElementById("asignar-img");
          if (data.imagenCedula) { img.src = data.imagenCedula; img.style.display = "block"; } 
          else { img.style.display = "none"; }
          
          document.getElementById("vista-escaneo").style.display = "none";
          document.getElementById("vista-formulario-asignar").style.display = "block";
          
        } else if (data.tipoVista === "resultadoDevolución") {
          document.getElementById("badge-mensaje-devolver").innerText = data.mensaje;
document.getElementById("devolver-nombre").innerText = data.nombre || "-";document.getElementById("devolver-cedula").innerText = data.cedula || "-";const img = document.getElementById("devolver-img");if (data.imagenCedula) { img.src = data.imagenCedula; img.style.display = "block"; }else { img.style.display = "none"; }document.getElementById("vista-escaneo").style.display = "none";document.getElementById("vista-resultado-devolver").style.display = "block";} else {
          // Si es la respuesta exitosa del guardado del número
          alert(data.mensaje);regresarAlMenu();}} else {
        // En caso de error, muestra el aviso estructural y reactiva tras 6 segundos
        r.className = data.color || "red";r.innerHTML = <strong>${data.mensaje || "Error"}
        </strong><br> ${data.nombre ? 'Nombre: ' + data.nombre + '<br>' : ''} ${data.cedula ? 'Cédula: ' + data.cedula : ''};setTimeout(() => {r.innerHTML = "";r.className = "";procesandoScan = false;iniciarCamara();}, 6000);}};
          function enviarDatosAsignacion() 
          {const numero = document.getElementById("inputNumeroAsignado").value.trim();if (!numero) {alert("Por favor, ingrese un número antes de guardar.");return;}
           ejecutarPeticionJsonp({ accion: "confirmarAsignar", codigoQR: codigoQRLimpioGuardado, numeroAsignado: numero });}
        function cancelarEscaneo() {if (html5QrcodeScanner) {html5QrcodeScanner.stop().then(() => { regresarAlMenu(); }).catch(() => { regresarAlMenu(); });} else {regresarAlMenu();}}
        function regresarAlMenu() {procesandoScan = false;modoActual = "";codigoQRLimpioGuardado = "";document.getElementById("resultado").innerHTML = "";document.getElementById("resultado").className = "";
         // Resetear vistas
          document.getElementById("vista-formulario-asignar").style.display = "none";document.getElementById("vista-resultado-devolver").style.display = "none";
          document.getElementById("reader").style.display = "none";
                                   document.getElementById("btnCancelarCamara").style.display = "none";
